paper_id: paper:score-forest-2013
title: Scene Coordinate Regression Forests for Camera Relocalization in RGB-D Images
year: 2013
venue: IEEE/CVF Conference on Computer Vision and Pattern Recognition
venue_type: conference
venue_tier: A*
abstract: Randomized forests predict scene coordinates from RGB-D image patches for camera relocalization.
summary: Establishes scene coordinate regression as a practical camera relocalization formulation using
  RGB-D inputs.
problem: Recover camera pose in a known indoor scene from RGB-D observations without relying on sparse
  hand-crafted matches.
prior_gap: Classical feature matching and structure-based localization could be brittle for texture-poor
  indoor RGB-D scenes.
stage: Scene coordinate regression
advance: Recasts relocalization as dense pixel-to-scene-coordinate prediction followed by robust pose
  optimization.
metric:
- Pose accuracy at 5cm / 5deg
- Median translation and rotation error
why_this_metric: Scene relocalization needs both thresholded success rates and pose-error statistics because
  downstream AR or robotics use cases fail sharply beyond small pose tolerances.
dataset:
- 7Scenes
dataset_limitations:
- Indoor RGB-D benchmarks underrepresent outdoor scale, long-term appearance change, and low-overlap image
  retrieval cases.
limitations:
- Requires scene-specific training and RGB-D style scene supervision.
