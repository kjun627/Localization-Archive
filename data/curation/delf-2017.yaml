abstract: Image retrieval with local features paper focused on 3D visual localization archives.
summary: Learns local descriptors and an attention mechanism that selects discriminative regions for scalable
  retrieval.
problem: Scale instance-level image retrieval while retaining local discriminativeness.
prior_gap: Global CNN descriptors were compact but weak for some instance-level matches, while dense local
  matching was expensive.
stage: Image retrieval with local features
advance: Learns local descriptors and an attention mechanism that selects discriminative regions for scalable
