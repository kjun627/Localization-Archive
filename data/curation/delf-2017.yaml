- Google Landmarks
- Oxford5k
- Paris6k
dataset_limitations:
- Dataset coverage and protocol differences can affect how directly results transfer to new localization
  deployments.
limitations:
- Primarily evaluated for landmark retrieval.
- Local feature indexing adds complexity compared with single-vector descriptors.
