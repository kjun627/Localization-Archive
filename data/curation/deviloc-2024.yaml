paper_id: paper:deviloc-2024
title: Learning to Produce Semi-dense Correspondences for Visual Localization
year: 2024
venue: IEEE/CVF Conference on Computer Vision and Pattern Recognition
venue_type: conference
venue_tier: A*
abstract: Semi-dense visual localization method that predicts denser 2D-3D correspondences from sparse
  references.
summary: Produces semi-dense query-to-map correspondences so structure-based localization can use more
  evidence than sparse keypoints alone.
problem: Improve localization under weather, lighting, and viewpoint changes where sparse matches are
  unreliable.
prior_gap: HLoc-style pipelines depend on predefined map keypoints and can miss useful evidence in
  texture-poor or strongly changed regions.
stage: Semi-dense correspondence localization
advance: Learns a semi-dense correspondence module that expands reliable 2D-3D matches before robust
  pose estimation.
metric:
- Pose accuracy at thresholds
- Localization recall
- Median rotation error
- Median translation error
why_this_metric: The contribution is useful when added correspondences improve final camera pose rather
  than only pairwise image matching scores.
dataset:
- Aachen Day-Night
- RobotCar Seasons
- CMU Seasons
dataset_limitations:
- Long-term localization benchmarks still emphasize a fixed set of urban routes and reference maps.
limitations:
- Depends on a reconstructed reference map and external matching components.
- Runtime and memory cost can rise with denser correspondence hypotheses.
