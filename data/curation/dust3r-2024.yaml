paper_id: paper:dust3r-2024
title: 'DUSt3R: Geometric 3D Vision Made Easy'
year: 2024
venue: IEEE/CVF Conference on Computer Vision and Pattern Recognition
venue_type: conference
venue_tier: A*
abstract: Predicts dense pointmaps for unconstrained stereo and can recover geometry, depth, matches,
  focal lengths, and camera poses without known calibration.
summary: A dense 3D foundation model that becomes important context for newer 3D-grounded matching and
  localization components.
problem: Simplify geometric 3D vision when camera intrinsics and extrinsics are unavailable.
prior_gap: Classical SfM and MVS pipelines require calibrated images and many hand-engineered stages.
stage: Foundation dense 3D reconstruction
advance: Uses transformer pointmap prediction and global alignment to unify stereo, depth, matching, and
  camera recovery.
metric:
- Depth estimation
- Relative pose estimation
- 3D reconstruction quality
- Matching quality
why_this_metric: DUSt3R is adjacent to localization through pose and matching, not through a single relocalization
  benchmark alone.
dataset:
- CO3Dv2
- ARKitScenes
- ScanNet++
- BlendedMVS
- Waymo Open
- MegaDepth
dataset_limitations:
- It is not primarily a visual localization benchmark paper.
limitations:
- Large model and non-commercial license constraints limit direct deployment.
- Best treated as an adjacent foundation baseline rather than a PPVL method.
