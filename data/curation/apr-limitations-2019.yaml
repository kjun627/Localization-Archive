paper_id: paper:apr-limitations-2019
title: Understanding the Limitations of CNN-Based Absolute Camera Pose Regression
year: 2019
venue: IEEE/CVF Conference on Computer Vision and Pattern Recognition
venue_type: conference
venue_tier: A*
abstract: Analyzes absolute pose regression and shows that many CNN-based APR methods behave more like
  image retrieval than geometric pose estimation.
summary: Provides a negative baseline explaining why compact absolute pose regressors often fail to match
  structure-based localization.
problem: Explain why CNN-based absolute camera pose regression underperforms geometry-based localization.
prior_gap: APR papers reported compact and fast relocalization but lacked a clear account of geometric
  failure modes.
stage: Localization analysis
advance: Shows APR often does not outperform retrieval baselines and predicts failure when viewpoint coverage
  is limited.
metric:
- Median translation error
- Median rotation error
- Retrieval baseline comparison
why_this_metric: The paper tests whether learned regression actually improves pose estimation beyond nearest-neighbor
  retrieval.
dataset:
- Cambridge Landmarks
- 7Scenes
- APR diagnostic datasets
dataset_limitations:
- The analysis targets earlier APR families and does not fully settle later map-conditioned regressors.
limitations:
- Later map-relative and scene-conditioned pose regressors require separate analysis.
