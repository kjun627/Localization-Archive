paper_id: "paper:marepo-2024"
title: "MARePo: Mapping-agnostic Regression for Efficient Pose Estimation"
year: 2024
venue: European Conference on Computer Vision
venue_type: conference
venue_tier: A
abstract: Regression-based localization with stronger generalization across maps and scenes.
summary: Decouples some map-specific assumptions to reduce retraining dependence for pose regression.
problem: Reduce scene-specific dependence in regression-based localization pipelines.
prior_gap: Efficient localization models such as ACE still required per-scene optimization and limited cross-scene reuse.
metric:
  - Pose accuracy at 5cm / 5deg
  - Cross-scene generalization
why_this_metric: The contribution claims better transferability, so evaluation must include both pose precision and performance beyond the original training scene.
dataset:
  - Cambridge Landmarks
  - 7Scenes
dataset_limitations:
  - Existing benchmarks remain modest in scale compared with open-world city localization.
limitations:
  - Generalization gains may still depend on scene overlap and representation bias.
