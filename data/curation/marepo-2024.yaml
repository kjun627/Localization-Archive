paper_id: paper:marepo-2024
title: Map-Relative Pose Regression for Visual Re-Localization
year: 2024
venue: IEEE/CVF Conference on Computer Vision and Pattern Recognition
venue_type: conference
venue_tier: A*
abstract: Regression-based localization with stronger generalization across maps and scenes.
summary: Conditions pose regression on scene-specific map representations so a regressor can transfer
  across scenes and adapt quickly.
problem: Reduce scene-specific data hunger in regression-based visual relocalization.
prior_gap: ACE made scene-coordinate mapping fast, but pose regression still needed scene-specific training
  or large synthetic data to become accurate.
stage: Map-relative pose regression
advance: Learns a scene-agnostic pose regressor conditioned on a scene map, moving from per-scene absolute
  regression toward reusable map-relative inference.
metric:
- Pose accuracy at 5cm / 5deg
- Cross-scene generalization
why_this_metric: The contribution claims better transferability, so evaluation must include both pose
  precision and performance beyond the original training scene.
dataset:
- Cambridge Landmarks
- 7Scenes
dataset_limitations:
- Existing benchmarks remain modest in scale compared with open-world city localization.
limitations:
- Generalization gains may still depend on scene overlap and representation bias.
