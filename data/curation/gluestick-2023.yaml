paper_id: paper:gluestick-2023
title: 'GlueStick: Robust Image Matching by Sticking Points and Lines Together'
year: 2023
venue: IEEE/CVF International Conference on Computer Vision
venue_type: conference
venue_tier: A*
abstract: Joint point-line matching paper focused on 3D visual localization archives.
summary: Represents points and lines as wireframes and jointly matches them with graph neural reasoning.
problem: Match images robustly when points alone fail in textureless or structurally repetitive scenes.
prior_gap: Prior systems usually matched points and line segments separately, losing complementary structural
  constraints.
stage: Joint point-line matching
advance: Represents points and lines as wireframes and jointly matches them with graph neural reasoning.
metric:
- matching accuracy
- relative pose AUC
- homography estimation
- visual localization recall
why_this_metric: The archive tracks downstream localization, matching, retrieval, privacy, or benchmark
  behavior rather than isolated model scores.
dataset:
- MegaDepth
- ScanNet
- Wireframe
- Aachen Day-Night
- InLoc
dataset_limitations:
- Dataset coverage and protocol differences can affect how directly results transfer to new localization
  deployments.
limitations:
- Requires reliable line extraction.
- Less useful in scenes without strong linear structure.
