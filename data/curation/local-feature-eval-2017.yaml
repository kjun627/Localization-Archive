abstract: Local feature evaluation paper focused on 3D visual localization archives.
summary: Benchmarks descriptors inside an image-based reconstruction pipeline with public evaluation code.
problem: Evaluate local descriptors by downstream reconstruction utility instead of fragmented patch-level
  metrics.
prior_gap: Descriptor papers used metrics that did not reliably predict SfM or localization usefulness.
stage: Local feature evaluation
advance: Benchmarks descriptors inside an image-based reconstruction pipeline with public evaluation code.
metric:
- registered images
- sparse points
- track length
- reprojection error
why_this_metric: The archive tracks downstream localization, matching, retrieval, privacy, or benchmark
  behavior rather than isolated model scores.
dataset:
- Fountain
- Herz-Jesu
- South Building
- Madrid Metropolis
- Gendarmenmarkt
dataset_limitations:
- Dataset coverage and protocol differences can affect how directly results transfer to new localization
  deployments.
limitations:
- Descriptor-focused rather than full detector-matcher pipelines.
- Predates transformer and dense matchers.
