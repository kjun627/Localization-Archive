paper_id: "paper:netvlad-2016"
title: "NetVLAD: CNN Architecture for Weakly Supervised Place Recognition"
year: 2016
venue: IEEE/CVF Conference on Computer Vision and Pattern Recognition
venue_type: conference
venue_tier: A*
abstract: A trainable VLAD layer learns image retrieval descriptors for place recognition from weak supervision.
summary: Provides a retrieval backbone that became a common first stage for large-scale visual localization systems.
problem: Retrieve visually corresponding places under large viewpoint and appearance changes.
prior_gap: Handcrafted global descriptors and non-trainable aggregation often lacked robustness for city-scale image retrieval.
metric:
  - Recall at K
  - Localization retrieval recall
why_this_metric: Retrieval is a candidate-generation stage, so recall at small K directly measures whether the downstream geometric localizer receives useful database images.
dataset:
  - Pittsburgh 250k
  - Tokyo 24/7
dataset_limitations:
  - Place recognition datasets do not fully measure final 6-DoF pose quality without a downstream geometric localization step.
limitations:
  - Retrieval alone cannot estimate metric pose and may fail under severe perceptual aliasing.
