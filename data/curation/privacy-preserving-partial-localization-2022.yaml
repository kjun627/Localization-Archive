dataset:
- visual localization point-cloud and line-cloud datasets
dataset_limitations:
- Dataset coverage and protocol differences can affect how directly results transfer to new localization
  deployments.
limitations:
- Full 6-DoF pose requires client-side fusion across multiple partial results.
- System complexity increases.
