abstract: Partial pose privacy paper focused on 3D visual localization archives.
summary: Returns partial pose constraints that can be fused client-side into full localization.
problem: Prevent both map inversion and exact user-pose disclosure to the server.
prior_gap: Earlier privacy-preserving localization protected maps or queries but still returned exact
  server-side poses.
stage: Partial pose privacy
advance: Returns partial pose constraints that can be fused client-side into full localization.
