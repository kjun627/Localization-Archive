paper_id: paper:pixloc-2021
title: 'Back to the Feature: Learning Robust Camera Localization From Pixels to Pose'
year: 2021
venue: IEEE/CVF Conference on Computer Vision and Pattern Recognition
venue_type: conference
venue_tier: A*
abstract: Pixel-wise feature alignment refines camera pose through learned dense matching and geometric
  optimization.
summary: Reintroduces geometric pose refinement around learned features to improve RGB camera localization
  robustness.
problem: Refine camera poses from image evidence without depending only on sparse correspondences or direct
  pose regression.
prior_gap: Retrieval and sparse matching pipelines could produce rough poses, while direct regression
  often lacked geometric precision.
stage: Feature-alignment pose refinement
advance: Separates scene-agnostic feature learning from geometric pose optimization through direct 2D-3D
  feature alignment.
metric:
- Pose accuracy at multiple thresholds
- Median translation and rotation error
why_this_metric: Pose refinement should be judged by final metric pose precision at strict and relaxed
  thresholds, not only by feature similarity.
dataset:
- 7Scenes
- Cambridge Landmarks
- Aachen Day-Night
dataset_limitations:
- Common benchmarks do not fully represent real-time map updates or broad open-world appearance changes.
limitations:
- Requires a good initialization and can inherit failure modes from retrieval or coarse pose estimation.
