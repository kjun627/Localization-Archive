paper_id: "paper:air-hloc-2025"
title: "AIR-HLoc: Adaptive Retrieved Images Selection for Efficient Visual Localisation"
year: 2025
venue: IEEE International Conference on Robotics and Automation
venue_type: conference
venue_tier: A*
abstract: Adapts the number of retrieved reference images in HLoc-style localization by estimating query difficulty from global descriptor similarity.
summary: Improves hierarchical localization efficiency by replacing a fixed retrieval top-k with adaptive query-dependent retrieval counts.
problem: Avoid wasting matching compute on easy queries while giving hard queries enough retrieved images.
prior_gap: HLoc-style pipelines usually set retrieval top-k globally rather than per query.
stage: Retrieval policy and localization efficiency
advance: Classifies query difficulty from retrieval similarity and assigns adaptive image counts before local matching.
metric:
  - Absolute trajectory error
  - Angular rotation error
  - Aachen threshold accuracy
  - Matching runtime
  - Retrieved image count
why_this_metric: The contribution targets compute efficiency without sacrificing localization accuracy.
dataset:
  - Cambridge Landmarks
  - 7Scenes
  - Aachen Day-Night v1.1
dataset_limitations:
  - Benefit depends on retrieval score calibration across scenes and descriptors.
limitations:
  - No official code link was confirmed during curation.
  - Adaptive policy quality depends on global descriptor reliability.
