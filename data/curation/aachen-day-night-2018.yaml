paper_id: "paper:aachen-day-night-2018"
title: "Benchmarking 6DOF Outdoor Visual Localization in Changing Conditions"
year: 2018
venue: IEEE/CVF Conference on Computer Vision and Pattern Recognition
venue_type: conference
venue_tier: A*
abstract: A benchmark for outdoor 6-DoF localization under day-night and changing-condition challenges.
summary: Establishes a harder outdoor visual localization benchmark and evaluation protocol for long-term localization.
problem: Evaluate 6-DoF outdoor visual localization under illumination and appearance changes.
prior_gap: Many localization benchmarks were captured under limited conditions and did not sufficiently stress long-term robustness.
metric:
  - Pose accuracy at multiple translation and rotation thresholds
why_this_metric: Outdoor localization quality is application-dependent, so multiple thresholds reveal whether methods are useful for coarse retrieval, AR alignment, or precise navigation.
dataset:
  - Aachen Day-Night
dataset_limitations:
  - Benchmarking focuses on one urban environment and does not cover all weather, seasonal, or geographic variation.
limitations:
  - Dataset-centric evaluation can rank methods without explaining which pipeline component caused failure.
