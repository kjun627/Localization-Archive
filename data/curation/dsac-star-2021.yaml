paper_id: "paper:dsac-star-2021"
title: "DSAC*: Differentiable RANSAC for Camera Localization"
year: 2021
venue: IEEE Transactions on Pattern Analysis and Machine Intelligence
venue_type: journal
venue_tier: Q1
abstract: End-to-end camera localization with differentiable hypothesis selection.
summary: Neural-guided scene coordinate regression with differentiable RANSAC for robust camera pose estimation.
problem: Robust absolute pose estimation in scenes with ambiguous or noisy correspondences.
prior_gap: Classical RANSAC pipelines were not end-to-end trainable and struggled to learn localization-specific scoring behavior.
metric:
  - Pose accuracy at 5cm / 5deg
  - Median translation and rotation error
why_this_metric: Absolute camera localization is deployment-oriented, so thresholded pose accuracy and median pose error directly measure recoverable camera pose quality.
dataset:
  - Cambridge Landmarks
  - 7Scenes
dataset_limitations:
  - Indoor and landmark datasets can underrepresent larger viewpoint shifts and seasonal changes.
limitations:
  - Regression quality can still degrade under severe appearance changes.
