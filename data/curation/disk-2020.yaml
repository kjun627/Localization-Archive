dataset:
- MegaDepth
- HPatches
- Image Matching Challenge
dataset_limitations:
- Dataset coverage and protocol differences can affect how directly results transfer to new localization
  deployments.
limitations:
- Training complexity is higher than descriptor-only methods.
- Sparse coverage can still fail under low texture or domain shift.
