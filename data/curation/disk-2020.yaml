paper_id: paper:disk-2020
title: 'DISK: Learning Local Features with Policy Gradient'
year: 2020
venue: Advances in Neural Information Processing Systems
venue_type: conference
venue_tier: A*
abstract: Policy-gradient local features paper focused on 3D visual localization archives.
summary: Uses policy gradients to train sparse local features for matching and reconstruction objectives.
problem: Learn sparse keypoint selection and matching end-to-end despite discrete matching decisions.
prior_gap: Detect-then-match pipelines were difficult to optimize directly because keypoint selection
  is non-differentiable.
stage: Policy-gradient local features
advance: Uses policy gradients to train sparse local features for matching and reconstruction objectives.
